<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Docker 镜像下载统计报表</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }

        .header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
        }

        .stat-card .icon {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .stat-card .label {
            color: #666;
            font-size: 14px;
            margin-bottom: 5px;
        }

        .stat-card .value {
            color: #333;
            font-size: 32px;
            font-weight: bold;
        }

        .content-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        @media (max-width: 768px) {
            .content-grid {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
        }

        .card h2 {
            color: #333;
            font-size: 20px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }

        .chart-bar {
            margin-bottom: 15px;
        }

        .chart-bar-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            color: #666;
            font-size: 14px;
        }

        .chart-bar-bg {
            background: #f0f0f0;
            height: 30px;
            border-radius: 5px;
            overflow: hidden;
            position: relative;
        }

        .chart-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            padding-left: 10px;
            color: white;
            font-size: 12px;
            font-weight: bold;
        }

        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #f0f0f0;
        }

        th {
            background: #f8f9fa;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        td {
            color: #666;
            font-size: 14px;
        }

        tr:hover {
            background: #f8f9fa;
        }

        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }

        .badge-amd64 {
            background: #e3f2fd;
            color: #1976d2;
        }

        .badge-arm64 {
            background: #f3e5f5;
            color: #7b1fa2;
        }

        .badge-unknown {
            background: #fff3e0;
            color: #f57c00;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .refresh-btn {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: transform 0.2s ease;
        }

        .refresh-btn:hover {
            transform: scale(1.05);
        }

        .last-update {
            color: #666;
            font-size: 12px;
            margin-top: 10px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>📊 Docker 镜像下载统计报表</h1>
            <p>实时追踪用户下载的 Docker 镜像数据</p>
            <div style="margin-top: 15px;">
                <button class="refresh-btn" onclick="loadData()">🔄 刷新数据</button>
                <span class="last-update" id="lastUpdate">最后更新: -</span>
            </div>
        </div>

        <!-- Stats Cards -->
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="icon">📥</div>
                <div class="label">总下载次数</div>
                <div class="value" id="totalDownloads">-</div>
            </div>
            <div class="stat-card">
                <div class="icon">🏷️</div>
                <div class="label">不同镜像数</div>
                <div class="value" id="uniqueImages">-</div>
            </div>
            <div class="stat-card">
                <div class="icon">🏆</div>
                <div class="label">最受欢迎镜像</div>
                <div class="value" id="topImage" style="font-size: 16px;">-</div>
            </div>
            <div class="stat-card">
                <div class="icon">📈</div>
                <div class="label">今日下载</div>
                <div class="value" id="todayDownloads">-</div>
            </div>
        </div>

        <!-- Content Grid -->
        <div class="content-grid">
            <!-- Top Images Table -->
            <div class="card">
                <h2>🔥 热门镜像 Top 10</h2>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>排名</th>
                                <th>镜像</th>
                                <th>下载次数</th>
                                <th>架构</th>
                                <th>最近下载</th>
                            </tr>
                        </thead>
                        <tbody id="topImagesTable">
                            <tr>
                                <td colspan="5" class="loading">
                                    <div class="spinner"></div>
                                    加载中...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Arch Distribution -->
            <div class="card">
                <h2>💻 架构分布</h2>
                <div id="archDistribution">
                    <div class="loading">
                        <div class="spinner"></div>
                        加载中...
                    </div>
                </div>
            </div>
        </div>

        <!-- All Images Table -->
        <div class="card">
            <h2>📋 所有下载记录</h2>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>镜像</th>
                            <th>下载次数</th>
                            <th>架构</th>
                            <th>首次下载</th>
                            <th>最近下载</th>
                        </tr>
                    </thead>
                    <tbody id="allImagesTable">
                        <tr>
                            <td colspan="5" class="loading">
                                <div class="spinner"></div>
                                加载中...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        async function loadData() {
            try {
                const response = await fetch('/api/tracking-stats');
                const data = await response.json();

                updateStats(data);
                updateTopImages(data.data.slice(0, 10));
                updateAllImages(data.data);
                updateArchDistribution(data.archStats);

                // 更新时间
                document.getElementById('lastUpdate').textContent =
                    '最后更新: ' + new Date().toLocaleString('zh-CN');

            } catch (error) {
                console.error('Failed to load data:', error);
                showEmptyState();
            }
        }

        function updateStats(data) {
            document.getElementById('totalDownloads').textContent = data.total || 0;
            document.getElementById('uniqueImages').textContent = data.unique || 0;

            if (data.data && data.data.length > 0) {
                document.getElementById('topImage').textContent = data.data[0].image;
            } else {
                document.getElementById('topImage').textContent = '暂无数据';
            }

            // 今日下载
            const today = new Date().toISOString().split('T')[0];
            const todayCount = data.dailyStats ? (data.dailyStats[today] || 0) : 0;
            document.getElementById('todayDownloads').textContent = todayCount;
        }

        function updateTopImages(images) {
            const tbody = document.getElementById('topImagesTable');

            if (!images || images.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="5" class="empty-state">
                            <div class="icon">📭</div>
                            暂无下载记录
                        </td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = images.map((img, index) => `
                <tr>
                    <td>#${index + 1}</td>
                    <td><strong>${img.image}</strong></td>
                    <td>${img.count} 次</td>
                    <td>${img.archs.map(arch =>
                        `<span class="badge badge-${arch}">${arch}</span>`
                    ).join(' ')}</td>
                    <td>${formatDate(img.lastSeen)}</td>
                </tr>
            `).join('');
        }

        function updateAllImages(images) {
            const tbody = document.getElementById('allImagesTable');

            if (!images || images.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="5" class="empty-state">
                            <div class="icon">📭</div>
                            暂无下载记录
                        </td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = images.map(img => `
                <tr>
                    <td><strong>${img.image}</strong></td>
                    <td>${img.count} 次</td>
                    <td>${img.archs.map(arch =>
                        `<span class="badge badge-${arch}">${arch}</span>`
                    ).join(' ')}</td>
                    <td>${formatDate(img.firstSeen)}</td>
                    <td>${formatDate(img.lastSeen)}</td>
                </tr>
            `).join('');
        }

        function updateArchDistribution(archStats) {
            const container = document.getElementById('archDistribution');

            if (!archStats || Object.keys(archStats).length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📊</div>
                        暂无架构数据
                    </div>
                `;
                return;
            }

            const total = Object.values(archStats).reduce((a, b) => a + b, 0);
            const sorted = Object.entries(archStats).sort((a, b) => b[1] - a[1]);

            container.innerHTML = sorted.map(([arch, count]) => {
                const percentage = ((count / total) * 100).toFixed(1);
                return `
                    <div class="chart-bar">
                        <div class="chart-bar-label">
                            <span>${arch.toUpperCase()}</span>
                            <span>${count} 次 (${percentage}%)</span>
                        </div>
                        <div class="chart-bar-bg">
                            <div class="chart-bar-fill" style="width: ${percentage}%">${count}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function formatDate(dateStr) {
            if (!dateStr) return '-';
            const date = new Date(dateStr);
            return date.toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        function showEmptyState() {
            document.getElementById('totalDownloads').textContent = '0';
            document.getElementById('uniqueImages').textContent = '0';
            document.getElementById('topImage').textContent = '加载失败';
            document.getElementById('todayDownloads').textContent = '0';
        }

        // 自动刷新（每30秒）
        loadData();
        setInterval(loadData, 30000);
    </script>
</body>
</html>
