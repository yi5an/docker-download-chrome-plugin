<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>代理节点运维面板</title>
  <style>
    :root {
      --bg: linear-gradient(140deg, #f6efe5 0%, #dfe9f3 100%);
      --card: rgba(255,255,255,0.94);
      --text: #1f2937;
      --muted: #667085;
      --line: rgba(31,41,55,0.12);
      --accent: #0f766e;
      --accent-2: #155e75;
      --warn: #b45309;
      --danger: #b42318;
      --ok: #15803d;
      --shadow: 0 24px 48px rgba(15, 23, 42, 0.12);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", "PingFang SC", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    .shell {
      max-width: 1500px;
      margin: 0 auto;
      padding: 28px 20px 40px;
    }
    .hero, .panel, .stat {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }
    .hero {
      padding: 28px;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }
    h1, h2 { margin: 0; }
    h1 { font-size: 30px; }
    h2 { font-size: 18px; margin-bottom: 16px; }
    .sub { color: var(--muted); margin-top: 8px; }
    .toolbar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .btn {
      border: 0;
      border-radius: 999px;
      padding: 11px 18px;
      color: #fff;
      cursor: pointer;
      font-weight: 600;
      background: linear-gradient(90deg, var(--accent) 0%, var(--accent-2) 100%);
    }
    .btn.warn { background: linear-gradient(90deg, #c2410c 0%, #b45309 100%); }
    .stamp { color: var(--muted); font-size: 13px; }
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 20px;
    }
    .stat { padding: 18px 20px; }
    .label { color: var(--muted); font-size: 13px; margin-bottom: 8px; }
    .value { font-size: 28px; font-weight: 700; }
    .grid {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 18px;
      margin-bottom: 18px;
    }
    .panel { padding: 22px; }
    .kv { display: grid; grid-template-columns: 120px 1fr; gap: 8px 12px; font-size: 14px; }
    .kv div:nth-child(odd) { color: var(--muted); }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; word-break: break-all; }
    .bars { display: grid; gap: 14px; }
    .bar-label {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
      font-size: 13px;
      color: var(--muted);
    }
    .bar-bg {
      background: rgba(31,41,55,0.08);
      border-radius: 999px;
      height: 28px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      min-width: 40px;
      display: flex;
      align-items: center;
      padding-left: 12px;
      border-radius: 999px;
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      background: linear-gradient(90deg, var(--accent) 0%, var(--accent-2) 100%);
    }
    .table-wrap { overflow: auto; }
    table { width: 100%; border-collapse: collapse; }
    th, td {
      padding: 12px 10px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      font-size: 14px;
      vertical-align: top;
    }
    th {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .tag {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }
    .ok { background: rgba(21,128,61,0.12); color: var(--ok); }
    .warn-tag { background: rgba(180,83,9,0.12); color: var(--warn); }
    .err { background: rgba(180,35,24,0.12); color: var(--danger); }
    .empty { color: var(--muted); text-align: center; padding: 24px 0; }
    @media (max-width: 980px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="hero">
      <div>
        <h1>代理节点运维面板</h1>
        <div class="sub">统一查看当前代理节点的状态、缓存、流量和最近请求。</div>
      </div>
      <div class="toolbar">
        <button class="btn" onclick="loadData()">刷新</button>
        <button class="btn warn" onclick="clearCache()">清空缓存</button>
        <span class="stamp" id="lastUpdate">最后更新: -</span>
      </div>
    </section>

    <section class="stats">
      <div class="stat"><div class="label">节点状态</div><div class="value" id="registeredState">-</div></div>
      <div class="stat"><div class="label">总请求数</div><div class="value" id="totalRequests">-</div></div>
      <div class="stat"><div class="label">总流量</div><div class="value" id="totalBytes">-</div></div>
      <div class="stat"><div class="label">缓存命中率</div><div class="value" id="cacheHitRate">-</div></div>
      <div class="stat"><div class="label">测速延迟</div><div class="value" id="latencyMs">-</div></div>
      <div class="stat"><div class="label">缓存条目</div><div class="value" id="cacheItems">-</div></div>
    </section>

    <section class="grid">
      <div class="panel">
        <h2>节点信息</h2>
        <div class="kv" id="nodeInfo"></div>
      </div>
      <div class="panel">
        <h2>域名流量</h2>
        <div class="bars" id="domainTraffic"><div class="empty">加载中...</div></div>
      </div>
    </section>

    <section class="grid">
      <div class="panel">
        <h2>缓存与流量概览</h2>
        <div class="bars" id="cacheOverview"><div class="empty">加载中...</div></div>
      </div>
      <div class="panel">
        <h2>追踪统计</h2>
        <div class="bars" id="trackingOverview"><div class="empty">加载中...</div></div>
      </div>
    </section>

    <section class="panel">
      <h2>正在下载层</h2>
      <div id="activeTransfers"><div class="empty">加载中...</div></div>
    </section>

    <section class="panel">
      <h2>最近代理请求</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>时间</th>
              <th>类型</th>
              <th>状态</th>
              <th>缓存</th>
              <th>大小</th>
              <th>耗时</th>
              <th>URL</th>
            </tr>
          </thead>
          <tbody id="recentRequests"><tr><td colspan="7" class="empty">加载中...</td></tr></tbody>
        </table>
      </div>
    </section>
  </div>

  <script>
    function fmtBytes(bytes) {
      const value = Number(bytes || 0);
      if (!value) return '0 B';
      const units = ['B', 'KB', 'MB', 'GB', 'TB'];
      const idx = Math.min(Math.floor(Math.log(value) / Math.log(1024)), units.length - 1);
      return `${(value / (1024 ** idx)).toFixed(idx === 0 ? 0 : 2)} ${units[idx]}`;
    }

    function fmtTime(value) {
      if (!value) return '-';
      return new Date(value).toLocaleString('zh-CN');
    }

    function statusTag(value) {
      if (value === 200 || value === 'online') return `<span class="tag ok">${value}</span>`;
      if (String(value).startsWith('5') || value === 'error') return `<span class="tag err">${value}</span>`;
      return `<span class="tag warn-tag">${value}</span>`;
    }

    function percent(value) {
      return `${Number(value || 0).toFixed(1)}%`;
    }

    function shortDigest(digest) {
      if (!digest) return '-';
      return digest.length > 24 ? `${digest.slice(0, 24)}...` : digest;
    }

    function fmtDuration(ms) {
      const totalSeconds = Math.max(0, Math.floor((ms || 0) / 1000));
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = totalSeconds % 60;
      return `${minutes}m ${seconds}s`;
    }

    function renderBar(label, current, total, displayValue) {
      const denominator = total > 0 ? total : 1;
      const width = Math.max(4, Math.min(100, (current / denominator) * 100));
      return `
        <div>
          <div class="bar-label"><span>${label}</span><span>${displayValue}</span></div>
          <div class="bar-bg"><div class="bar-fill" style="width:${width}%">${displayValue}</div></div>
        </div>
      `;
    }

    async function loadData() {
      const [nodeStatusRes, trafficRes, trackingRes] = await Promise.all([
        fetch('/api/node-status'),
        fetch('/api/traffic-stats'),
        fetch('/api/tracking-stats')
      ]);

      const nodeStatus = await nodeStatusRes.json();
      const traffic = await trafficRes.json();
      const tracking = await trackingRes.json();

      document.getElementById('registeredState').textContent = nodeStatus.registered ? '已注册' : '未注册';
      document.getElementById('totalRequests').textContent = traffic.totalRequests || 0;
      document.getElementById('totalBytes').textContent = fmtBytes(traffic.totalBytes);
      document.getElementById('cacheHitRate').textContent = traffic.cacheHitRate || '0%';
      document.getElementById('latencyMs').textContent = nodeStatus.lastSpeedTest?.latencyMs ? `${nodeStatus.lastSpeedTest.latencyMs} ms` : '-';
      document.getElementById('cacheItems').textContent = nodeStatus.cache?.size || 0;
      document.getElementById('lastUpdate').textContent = `最后更新: ${fmtTime(new Date().toISOString())}`;

      document.getElementById('nodeInfo').innerHTML = `
        <div>节点 ID</div><div class="mono">${nodeStatus.proxyNodeId}</div>
        <div>公网地址</div><div class="mono">${nodeStatus.service.publicBaseUrl}</div>
        <div>记录服务</div><div class="mono">${nodeStatus.service.registryServiceUrl}</div>
        <div>上游代理</div><div class="mono">${nodeStatus.service.upstreamProxyEnabled ? nodeStatus.service.upstreamProxyUrl : '直连'}</div>
        <div>最近心跳</div><div>${fmtTime(nodeStatus.lastHeartbeatAt)}</div>
        <div>测速目标</div><div class="mono">${nodeStatus.lastSpeedTest?.target || '-'}</div>
      `;

      const domains = Object.entries(traffic.byDomain || {}).sort((a, b) => b[1].bytes - a[1].bytes).slice(0, 6);
      document.getElementById('domainTraffic').innerHTML = domains.length
        ? domains.map(([domain, stats]) => renderBar(domain, stats.bytes, domains[0][1].bytes, `${stats.requests} req / ${fmtBytes(stats.bytes)}`)).join('')
        : '<div class="empty">暂无域名流量</div>';

      document.getElementById('cacheOverview').innerHTML = [
        renderBar('缓存容量', nodeStatus.cache.currentBytes || 0, nodeStatus.cache.maxBytes || 1, `${fmtBytes(nodeStatus.cache.currentBytes)} / ${fmtBytes(nodeStatus.cache.maxBytes)}`),
        renderBar('缓存条目', nodeStatus.cache.size || 0, nodeStatus.cache.maxSize || 1, `${nodeStatus.cache.size || 0} / ${nodeStatus.cache.maxSize || 0}`),
        renderBar('缓存命中', traffic.cacheHits || 0, Math.max((traffic.cacheHits || 0) + (traffic.cacheMisses || 0), 1), `${traffic.cacheHits || 0} / ${traffic.cacheMisses || 0}`)
      ].join('');

      const today = new Date().toISOString().split('T')[0];
      document.getElementById('trackingOverview').innerHTML = [
        renderBar('总追踪下载', tracking.total || 0, Math.max(tracking.total || 0, 1), `${tracking.total || 0}`),
        renderBar('唯一镜像', tracking.unique || 0, Math.max(tracking.total || 0, 1), `${tracking.unique || 0}`),
        renderBar('今日下载', (tracking.dailyStats && tracking.dailyStats[today]) || 0, Math.max(tracking.total || 0, 1), `${(tracking.dailyStats && tracking.dailyStats[today]) || 0}`)
      ].join('');

      const activeTransfers = document.getElementById('activeTransfers');
      if (!nodeStatus.activeTransfers || !nodeStatus.activeTransfers.length) {
        activeTransfers.innerHTML = '<div class="empty">当前没有正在下载的层</div>';
      } else {
        activeTransfers.innerHTML = nodeStatus.activeTransfers.map(item => {
          const total = Number(item.contentLength || 0);
          const current = Number(item.bytesWritten || 0);
          const progressText = total > 0 ? `${fmtBytes(current)} / ${fmtBytes(total)}` : fmtBytes(current);
          const progressRow = renderBar(
            `${item.image || '-'}:${item.tag || '-'} [${item.arch || '-'}]`,
            current,
            total || Math.max(current, 1),
            progressText
          );

          return `
            <div style="padding:14px 0;border-bottom:1px solid var(--line);">
              ${progressRow}
              <div class="kv" style="grid-template-columns:110px 1fr; margin-top:10px;">
                <div>Digest</div><div class="mono">${shortDigest(item.digest)}</div>
                <div>状态</div><div>${statusTag(item.status || '-')}</div>
                <div>速度</div><div>${Number(item.speedMbps || 0).toFixed(2)} Mbps</div>
                <div>耗时</div><div>${fmtDuration(item.elapsedMs || 0)}</div>
              </div>
            </div>
          `;
        }).join('');
      }

      const recentRequests = document.getElementById('recentRequests');
      if (!nodeStatus.recentRequests || !nodeStatus.recentRequests.length) {
        recentRequests.innerHTML = '<tr><td colspan="7" class="empty">暂无代理请求</td></tr>';
      } else {
        recentRequests.innerHTML = nodeStatus.recentRequests.map(item => `
          <tr>
            <td>${fmtTime(item.timestamp)}</td>
            <td>${item.type || '-'}</td>
            <td>${statusTag(item.status)}</td>
            <td>${item.fromCache ? '<span class="tag ok">HIT</span>' : '<span class="tag warn-tag">MISS</span>'}</td>
            <td>${fmtBytes(item.bytes)}</td>
            <td>${item.durationMs || 0} ms</td>
            <td class="mono">${item.url || '-'}${item.error ? `<br><span class="err">${item.error}</span>` : ''}</td>
          </tr>
        `).join('');
      }
    }

    async function clearCache() {
      if (!confirm('确定要清空缓存吗？')) return;
      await fetch('/api/cache-clear', { method: 'POST' });
      await loadData();
    }

    loadData().catch(error => {
      console.error(error);
      document.getElementById('lastUpdate').textContent = `加载失败: ${error.message}`;
    });
    setInterval(() => loadData().catch(console.error), 10000);
  </script>
</body>
</html>
