<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>代理服务器流量统计</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }

        .header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .refresh-btn {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            margin-right: 10px;
            transition: transform 0.2s ease;
        }

        .refresh-btn:hover {
            transform: scale(1.05);
        }

        .danger-btn {
            background: #f44336;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-card .icon {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .stat-card .label {
            color: #666;
            font-size: 14px;
            margin-bottom: 5px;
        }

        .stat-card .value {
            color: #333;
            font-size: 32px;
            font-weight: bold;
        }

        .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
        }

        .card h2 {
            color: #333;
            font-size: 20px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }

        .chart-bar {
            margin-bottom: 15px;
        }

        .chart-bar-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            color: #666;
            font-size: 14px;
        }

        .chart-bar-bg {
            background: #f0f0f0;
            height: 30px;
            border-radius: 5px;
            overflow: hidden;
        }

        .chart-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            padding-left: 10px;
            color: white;
            font-size: 12px;
            font-weight: bold;
        }

        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #f0f0f0;
        }

        th {
            background: #f8f9fa;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        td {
            color: #666;
            font-size: 14px;
        }

        tr:hover {
            background: #f8f9fa;
        }

        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }

        .badge-hit {
            background: #4caf50;
            color: white;
        }

        .badge-miss {
            background: #f44336;
            color: white;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .info-text {
            color: #666;
            font-size: 12px;
            margin-top: 10px;
        }

        .format-bytes {
            color: #667eea;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>📊 代理服务器流量统计</h1>
            <p>实时监控代理服务器的流量使用和缓存性能</p>
            <div style="margin-top: 15px;">
                <button class="refresh-btn" onclick="loadData()">🔄 刷新数据</button>
                <button class="refresh-btn danger-btn" onclick="clearCache()">🗑️ 清空缓存</button>
                <span class="info-text" id="lastUpdate">最后更新: -</span>
            </div>
        </div>

        <!-- Stats Cards -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="icon">📡</div>
                <div class="label">总请求数</div>
                <div class="value" id="totalRequests">-</div>
            </div>
            <div class="stat-card">
                <div class="icon">💾</div>
                <div class="label">总流量</div>
                <div class="value" id="totalBytes" style="font-size: 20px;">-</div>
            </div>
            <div class="stat-card">
                <div class="icon">✅</div>
                <div class="label">缓存命中</div>
                <div class="value" id="cacheHits">-</div>
            </div>
            <div class="stat-card">
                <div class="icon">❌</div>
                <div class="label">缓存未命中</div>
                <div class="value" id="cacheMisses">-</div>
            </div>
            <div class="stat-card">
                <div class="icon">📈</div>
                <div class="label">缓存命中率</div>
                <div class="value" id="cacheHitRate" style="font-size: 24px;">-</div>
            </div>
            <div class="stat-card">
                <div class="icon">⏱️</div>
                <div class="label">运行时间</div>
                <div class="value" id="uptime" style="font-size: 20px;">-</div>
            </div>
        </div>

        <!-- Content Grid -->
        <div class="content-grid">
            <!-- Cache Stats -->
            <div class="card">
                <h2>💾 缓存统计</h2>
                <div id="cacheStats">
                    <div class="loading">
                        <div class="spinner"></div>
                        加载中...
                    </div>
                </div>
            </div>

            <!-- Domain Traffic -->
            <div class="card">
                <h2>🌐 域名流量分布</h2>
                <div id="domainTraffic">
                    <div class="loading">
                        <div class="spinner"></div>
                        加载中...
                    </div>
                </div>
            </div>
        </div>

        <!-- Cache Entries -->
        <div class="card">
            <h2>📋 缓存条目（最近使用）</h2>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>URL</th>
                            <th>大小</th>
                            <th>缓存时间</th>
                            <th>存活时间</th>
                        </tr>
                    </thead>
                    <tbody id="cacheEntries">
                        <tr>
                            <td colspan="4" class="loading">
                                <div class="spinner"></div>
                                加载中...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        async function loadData() {
            try {
                const [trafficRes, cacheRes, entriesRes] = await Promise.all([
                    fetch('/api/traffic-stats'),
                    fetch('/api/cache-stats'),
                    fetch('/api/cache-entries')
                ]);

                const traffic = await trafficRes.json();
                const cache = await cacheRes.json();
                const entries = await entriesRes.json();

                updateTrafficStats(traffic);
                updateCacheStats(cache);
                updateDomainTraffic(traffic.byDomain);
                updateCacheEntries(entries);

                document.getElementById('lastUpdate').textContent =
                    '最后更新: ' + new Date().toLocaleString('zh-CN');
            } catch (error) {
                console.error('Failed to load data:', error);
            }
        }

        function updateTrafficStats(data) {
            document.getElementById('totalRequests').textContent = data.totalRequests || 0;
            document.getElementById('totalBytes').innerHTML =
                '<span class="format-bytes">' + formatBytes(data.totalBytes) + '</span>';
            document.getElementById('cacheHits').textContent = data.cacheHits || 0;
            document.getElementById('cacheMisses').textContent = data.cacheMisses || 0;
            document.getElementById('cacheHitRate').textContent = data.cacheHitRate || '0%';
            document.getElementById('uptime').textContent = formatUptime(data.uptime);
        }

        function updateCacheStats(cache) {
            const container = document.getElementById('cacheStats');
            const usagePercent = ((cache.currentBytes / cache.maxBytes) * 100).toFixed(1);

            container.innerHTML = `
                <div class="chart-bar">
                    <div class="chart-bar-label">
                        <span>缓存条目数</span>
                        <span>${cache.size} / ${cache.maxSize}</span>
                    </div>
                    <div class="chart-bar-bg">
                        <div class="chart-bar-fill" style="width: ${(cache.size / cache.maxSize * 100)}%">
                            ${cache.size}
                        </div>
                    </div>
                </div>
                <div class="chart-bar">
                    <div class="chart-bar-label">
                        <span>缓存大小</span>
                        <span>${formatBytes(cache.currentBytes)} / ${formatBytes(cache.maxBytes)}</span>
                    </div>
                    <div class="chart-bar-bg">
                        <div class="chart-bar-fill" style="width: ${usagePercent}%">
                            ${usagePercent}%
                        </div>
                    </div>
                </div>
                <div class="chart-bar">
                    <div class="chart-bar-label">
                        <span>缓存命中率</span>
                        <span>${cache.hitRate}</span>
                    </div>
                    <div class="chart-bar-bg">
                        <div class="chart-bar-fill" style="width: ${cache.hitRate}">
                            ${cache.hitRate}
                        </div>
                    </div>
                </div>
            `;
        }

        function updateDomainTraffic(byDomain) {
            const container = document.getElementById('domainTraffic');

            if (!byDomain || Object.keys(byDomain).length === 0) {
                container.innerHTML = '<div class="empty-state">暂无流量数据</div>';
                return;
            }

            const sorted = Object.entries(byDomain)
                .sort((a, b) => b[1].bytes - a[1].bytes);

            container.innerHTML = sorted.map(([domain, stats]) => {
                const maxBytes = sorted[0][1].bytes;
                const percentage = ((stats.bytes / maxBytes) * 100).toFixed(1);

                return `
                    <div class="chart-bar">
                        <div class="chart-bar-label">
                            <span>${domain}</span>
                            <span>${stats.requests} 次 / ${formatBytes(stats.bytes)}</span>
                        </div>
                        <div class="chart-bar-bg">
                            <div class="chart-bar-fill" style="width: ${percentage}%">
                                ${formatBytes(stats.bytes)}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function updateCacheEntries(entries) {
            const tbody = document.getElementById('cacheEntries');

            if (!entries || entries.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="4" class="empty-state">暂无缓存条目</td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = entries.slice(0, 20).map(entry => `
                <tr>
                    <td><a href="${entry.key}" target="_blank" style="color: #667eea;">${truncateUrl(entry.key, 80)}</a></td>
                    <td>${formatBytes(entry.size)}</td>
                    <td>${new Date(entry.timestamp).toLocaleString('zh-CN')}</td>
                    <td>${formatAge(entry.age)}</td>
                </tr>
            `).join('');
        }

        function formatBytes(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return (bytes / Math.pow(k, i)).toFixed(2) + ' ' + sizes[i];
        }

        function formatUptime(seconds) {
            const hours = Math.floor(seconds / 3600);
            const minutes = Math.floor((seconds % 3600) / 60);
            const secs = seconds % 60;

            if (hours > 24) {
                const days = Math.floor(hours / 24);
                return `${days} 天 ${hours % 24} 小时`;
            }
            return `${hours} 小时 ${minutes} 分钟`;
        }

        function formatAge(seconds) {
            const minutes = Math.floor(seconds / 60);
            const hours = Math.floor(minutes / 60);

            if (hours > 0) {
                return `${hours} 小时 ${minutes % 60} 分钟`;
            }
            return `${minutes} 分钟`;
        }

        function truncateUrl(url, maxLength) {
            if (url.length <= maxLength) return url;
            return url.substring(0, maxLength) + '...';
        }

        async function clearCache() {
            if (!confirm('确定要清空所有缓存吗？')) return;

            try {
                const res = await fetch('/api/cache-clear', { method: 'POST' });
                const data = await res.json();

                if (data.success) {
                    alert('缓存已清空！');
                    loadData();
                }
            } catch (error) {
                console.error('Failed to clear cache:', error);
                alert('清空缓存失败：' + error.message);
            }
        }

        // 初始加载
        loadData();

        // 自动刷新（每10秒）
        setInterval(loadData, 10000);
    </script>
</body>
</html>
