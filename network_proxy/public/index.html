<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Docker代理服务器监控面板</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .card h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.3em;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }

        .stat-item:last-child {
            border-bottom: none;
        }

        .stat-label {
            color: #666;
            font-weight: 500;
        }

        .stat-value {
            color: #333;
            font-weight: bold;
            font-size: 1.1em;
        }

        .stat-value.success {
            color: #28a745;
        }

        .stat-value.warning {
            color: #ffc107;
        }

        .stat-value.info {
            color: #17a2b8;
        }

        .chart-container {
            position: relative;
            height: 400px;
            margin-top: 20px;
        }

        .controls {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }

        .controls h3 {
            margin-bottom: 15px;
            color: #333;
        }

        .control-group {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        .control-group label {
            color: #666;
            font-weight: 500;
        }

        .control-group input, .control-group select {
            padding: 8px 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }

        .control-group input:focus, .control-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .cost-calculator {
            grid-column: 1 / -1;
        }

        .cost-input {
            display: flex;
            gap: 15px;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .cost-input label {
            min-width: 120px;
            font-weight: 500;
            color: #666;
        }

        .cost-input input {
            padding: 8px 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            flex: 1;
            min-width: 150px;
        }

        .cost-result {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
        }

        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }

        .status-online {
            background: #28a745;
            animation: pulse 2s infinite;
        }

        .status-offline {
            background: #dc3545;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(40, 167, 69, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(40, 167, 69, 0); }
            100% { box-shadow: 0 0 0 0 rgba(40, 167, 69, 0); }
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            margin: 10px 0;
        }

        @media (max-width: 768px) {
            .dashboard {
                grid-template-columns: 1fr;
            }

            .control-group {
                flex-direction: column;
                align-items: stretch;
            }

            .cost-input {
                flex-direction: column;
                align-items: stretch;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐳 Docker代理服务器监控面板</h1>

        <div class="controls">
            <h3>📊 控制面板</h3>
            <div class="control-group">
                <label for="date-picker">选择日期:</label>
                <input type="date" id="date-picker">

                <label for="days-range">显示天数:</label>
                <select id="days-range">
                    <option value="7">最近7天</option>
                    <option value="14">最近14天</option>
                    <option value="30">最近30天</option>
                </select>

                <button class="btn" onclick="refreshData()">🔄 刷新数据</button>
                <button class="btn" onclick="clearCache()">🗑️ 清理缓存</button>
            </div>
        </div>

        <div class="dashboard">
            <!-- 服务器状态 -->
            <div class="card">
                <h3>🚀 服务器状态</h3>
                <div id="server-status" class="loading">加载中...</div>
            </div>

            <!-- 总体统计 -->
            <div class="card">
                <h3>📈 总体统计</h3>
                <div id="overall-stats" class="loading">加载中...</div>
            </div>

            <!-- 缓存统计 -->
            <div class="card">
                <h3>💾 缓存统计</h3>
                <div id="cache-stats" class="loading">加载中...</div>
            </div>

            <!-- 今日统计 -->
            <div class="card">
                <h3>📅 今日统计</h3>
                <div id="today-stats" class="loading">加载中...</div>
            </div>

            <!-- 每日流量图表 -->
            <div class="card" style="grid-column: 1 / -1;">
                <h3>📊 每日流量趋势</h3>
                <div class="chart-container">
                    <canvas id="daily-chart"></canvas>
                </div>
            </div>

            <!-- 小时流量图表 -->
            <div class="card" style="grid-column: 1 / -1;">
                <h3>⏰ 24小时流量分布</h3>
                <div class="chart-container">
                    <canvas id="hourly-chart"></canvas>
                </div>
            </div>

            <!-- 成本计算器 -->
            <div class="card cost-calculator">
                <h3>💰 代理成本计算器</h3>
                <div class="cost-input">
                    <label>流量单价 (元/GB):</label>
                    <input type="number" id="price-per-gb" value="0.50" step="0.01" min="0">
                </div>
                <div class="cost-input">
                    <label>基础费用 (元/月):</label>
                    <input type="number" id="base-cost" value="50" step="1" min="0">
                </div>
                <div class="cost-input">
                    <label>计算周期:</label>
                    <select id="cost-period">
                        <option value="today">今日</option>
                        <option value="week">本周</option>
                        <option value="month">本月</option>
                    </select>
                    <button class="btn" onclick="calculateCost()">计算成本</button>
                </div>
                <div id="cost-result" class="cost-result" style="display: none;"></div>
            </div>
        </div>
    </div>

    <script src="/static/dashboard.js"></script>
</body>
</html>
